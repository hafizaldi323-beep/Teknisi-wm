<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" defer></script>
    <title>APP script Teknisi</title>
</head>
<body>
  <div class="container">
    <h1 class="text-center py-4">Formulir Pendaftaran</h1>
    <!-- akses link  script app -->
    <form method="post" action="https://script.google.com/macros/s/AKfycbw9EzInI7xZMYymuW30mdpTR7HxT1OI4XtQUmtE61vsaXUVkH6nicoTScprUd79gBeE/exec">
      <!--end akses-->
      <div class="mb-3">
        <label for="nama" class="form-label">Nama:</label>
        <input type="text" class="form-control" id="nama" name="nama" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="alamat" class="form-label">Alamat:</label>
        <input type="text" class="form-control" id="alamat" name="alamat" required>
      </div>
      <div class="mb-3">
        <label for="no_hp" class="form-label">Nomor HP:</label>
        <input type="text" class="form-control" id="no_hp" name="no_hp" required>
      </div>
      <div class="mb-3">
        <label for="port" class="form-label">Port:</label>
        <input type="text" class="form-control" id="port" name="port" required>
      </div>
      <div class="mb-3">
        <label for="odp" class="form-label">ODP:</label>
        <input type="text" class="form-control" id="odp" name="odp" required>
      </div>
    </form>
    <div class="mb-3">
    <button type="submit" class="btn btn-primary">
        Simpan Data
    </button>
</div>
  </div>
</body>
</html>
